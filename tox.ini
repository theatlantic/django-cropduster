[tox]
envlist =
    py{27,37}-dj111{,-grp}
    py37-dj20{,-grp}
    py37-dj21
    py37-dj22{,-grp}
    py37-dj30{,-grp}

[testenv]
commands =
    python runtests.py {posargs} --noinput
passenv =
    CI
    TRAVIS
    TRAVIS_*
    DEFAULT_FILE_STORAGE
    AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY
    S3
deps =
    selenium
    django-selenosis>=1.3.0
    boto3==1.12.18
    django-storages==1.9.1
    dj111: Django==1.11.29
    dj20: Django==2.0.13
    dj21: Django==2.1.15
    dj22: Django>=2.0,<3.0
    dj30: Django>=3.0,<3.1
    dj111-grp: django-grappelli==2.10.4
    dj20-grp: django-grappelli==2.11.1
    dj21-grp: django-grappelli==2.11.1
    dj22-grp: django-grappelli>=2.13.4
    dj30-grp: django-grappelli>=2.14.2
    lxml
    # TODO - Once changes for https://github.com/theatlantic/django-ckeditor.git are complete,
    #        uncomment next line and remove next line with the specific git SHA hash
    # -e git+https://github.com/theatlantic/django-ckeditor.git@v4.5.7+atl.7.1#egg=django-ckeditor
    -e git+https://github.com/theatlantic/django-ckeditor.git@2100ec804e8fc142585c0b6c373cfeeccddf7618#egg=django-ckeditor
    
